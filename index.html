<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Belated Wawa Day Wawa</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#f6f0ff,#efe4ff,#e7d8ff);
  color:#4b3b63;
}
.card{
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(10px);
  padding:48px 40px;
  border-radius:28px;
  box-shadow:0 12px 30px rgba(124,90,180,0.12);
  text-align:center;
  width:min(92%,760px);
}
.small{font-size:.9rem;letter-spacing:.2em;text-transform:uppercase;color:#8b73b0;margin-bottom:14px}
h1{margin:0;font-size:2.6rem;font-weight:700;color:#6e54a3;line-height:1.2;letter-spacing:-0.02em}
p{font-size:1.08rem;line-height:1.8;color:#5f5370;margin:18px 0 0}
.line{width:64px;height:3px;background:#d8c0ff;border-radius:999px;margin:26px auto}
button{
  margin-top:28px;
  border:none;
  padding:13px 22px;
  border-radius:999px;
  background:#b996ff;
  color:white;
  font-size:1rem;
  cursor:pointer;
  transition:.2s ease;
}
button:hover{transform:translateY(-2px);background:#a67fff}
</style>
</head>
<body>
  <div class="card">
    <div class="small">for wawa</div>
    <h1>Happy Wawa day</h1>
    <div class="line"></div>
    <p>Wishing you a calm, beautiful year filled with soft moments, warm smiles, and happiness that stays.</p>
    <p>You deserve lovely things today and always luey na. ✨</p>
    <button onclick="alert('Happy Birthday Na Wawa')">Open Message</button>
  </div>
</body>
</html>
